kind = "web"
previewPath = "/"
title = "NovaContent AI"
version = "1.0.0"
id = "artifacts/novacontent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19419

[services.development]
run = "pnpm --filter @workspace/novacontent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novacontent", "run", "build" ]
publicDir = "artifacts/novacontent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19419"
BASE_PATH = "/"
